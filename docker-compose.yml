services:
  mongo:
    image: mongo:7
    container_name: ai_resume_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  ai-service:
    build: ./ai-service
    container_name: ai_resume_ai
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/uploads

  server:
    build: ./server
    container_name: ai_resume_server
    restart: always
    ports:
      - "5001:5001"
    env_file:
      - ./server/.env
    depends_on:
      - mongo
      - ai-service
    volumes:
      - ./server:/app
      - /app/node_modules
      - ./uploads:/app/uploads

  client:
    build: ./client
    container_name: ai_resume_client
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  mongo_data:
